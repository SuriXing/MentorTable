<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14"/>
      <stop offset="1" stop-color="#1a1f3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="60%">
      <stop offset="0" stop-color="#5B7BFA" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5B7BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- table -->
  <ellipse cx="600" cy="430" rx="380" ry="48" fill="#3149a8" opacity="0.55"/>
  <ellipse cx="600" cy="420" rx="380" ry="48" fill="#5B7BFA" opacity="0.85"/>
  <!-- mentor seats: 5 colored dots -->
  <circle cx="320" cy="360" r="36" fill="#FB7185"/>
  <circle cx="450" cy="330" r="36" fill="#9F6BFF"/>
  <circle cx="600" cy="320" r="40" fill="#5B7BFA"/>
  <circle cx="750" cy="330" r="36" fill="#2DD4BF"/>
  <circle cx="880" cy="360" r="36" fill="#4ADE80"/>
  <!-- title -->
  <text x="600" y="180" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="92" font-weight="800" fill="#f5f7ff" letter-spacing="4">名人桌</text>
  <text x="600" y="240" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="36" font-weight="500" fill="#a7adc2" letter-spacing="6">MENTOR · TABLE</text>
  <text x="600" y="540" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" font-size="26" font-weight="400" fill="#a7adc2">Ask once · hear five mentor voices · in seconds</text>
</svg>
