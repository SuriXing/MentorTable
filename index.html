<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- U7.1: theme-color meta — one for light, one for dark via media query.
         The inline FOUC script below also injects the active value for
         the rare browser that ignores the media-query form. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)" />

    <meta name="description" content="名人桌 Mentor Table — 邀请你心目中的名人围坐一桌，针对你的难题各自给出建议。Invite great minds to a virtual round table; ask once, hear five distinct mentor voices in seconds." />

    <!-- Open Graph -->
    <meta property="og:title" content="名人桌 — Mentor Table" />
    <meta property="og:description" content="Invite great minds to a virtual round table — ask once, hear five distinct mentor voices in seconds." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="名人桌 — Mentor Table" />
    <meta name="twitter:description" content="Invite great minds to a virtual round table — ask once, hear five distinct mentor voices in seconds." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- U4.1: warm the upstream LLM origin early. Mentor calls go through
         our own /api proxy (same-origin), but the proxy fans out to
         dashscope.aliyuncs.com — getting DNS + TLS started during shell
         paint shaves 100-300ms off first mentor response on cold loads. -->
    <link rel="preconnect" href="https://dashscope.aliyuncs.com" crossorigin />
    <link rel="dns-prefetch" href="https://dashscope.aliyuncs.com" />

    <title>名人桌 — Mentor Table</title>

    <!-- U7.1: FOUC kill. Read theme + mode + lang from localStorage BEFORE
         first paint so the page never flashes default-dark when the user
         has light persisted (or vice versa), and never flashes English
         when zh-CN is persisted. Coordinates with src/hooks/useTheme.ts
         (keys: anoncafe_theme, anoncafe_theme_mode) and src/i18n.ts
         (key: language). All wrapped in try/catch — Safari Private
         Browsing throws SecurityError on localStorage access. -->
    <script>
      (function () {
        try {
          var THEMES = {
            blue:   { p: '#4360D3', d: '#3149a8', l: '#8A9FFC' },
            purple: { p: '#9F6BFF', d: '#7C3AED', l: '#C4A6FF' },
            teal:   { p: '#2DD4BF', d: '#0D9488', l: '#5EEAD4' },
            sunset: { p: '#FB7185', d: '#E11D48', l: '#FDA4AF' },
            forest: { p: '#4ADE80', d: '#16A34A', l: '#86EFAC' }
          };
          var theme = 'blue';
          var mode = 'dark';
          var lang = 'zh-CN';
          try { var t = localStorage.getItem('anoncafe_theme'); if (t && THEMES[t]) theme = t; } catch (e) {}
          try { var m = localStorage.getItem('anoncafe_theme_mode'); if (m === 'light' || m === 'dark') mode = m; } catch (e) {}
          try { var l = localStorage.getItem('language'); if (l) lang = l; } catch (e) {}
          if (mode === 'dark' && !localStorage.getItem('anoncafe_theme_mode')) {
            // honor system preference when nothing persisted
            try {
              if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) mode = 'light';
            } catch (e) {}
          }
          var root = document.documentElement;
          var t2 = THEMES[theme];
          root.style.setProperty('--primary', t2.p);
          root.style.setProperty('--primary-dark', t2.d);
          root.style.setProperty('--primary-light', t2.l);
          root.style.setProperty('--primary-color', t2.p);
          root.style.setProperty('--color-primary', t2.p);
          root.style.setProperty('--color-primary-dark', t2.d);
          root.style.setProperty('--border-focus', t2.p);
          root.dataset.themeMode = mode;
          root.dataset.theme = mode;
          root.lang = lang;
        } catch (e) {
          // best-effort only; React boot will re-apply.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
