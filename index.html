<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- U7.1: theme-color meta — one for light, one for dark via media query.
         The inline FOUC script below also injects the active value for
         the rare browser that ignores the media-query form. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)" />

    <meta name="description" content="名人桌 Mentor Table — 邀请你心目中的名人围坐一桌，针对你的难题各自给出建议。Invite great minds to a virtual round table; ask once, hear five distinct mentor voices in seconds." />

    <!-- Open Graph -->
    <meta property="og:title" content="名人桌 — Mentor Table" />
    <meta property="og:description" content="Invite great minds to a virtual round table — ask once, hear five distinct mentor voices in seconds." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="名人桌 — Mentor Table" />
    <meta name="twitter:description" content="Invite great minds to a virtual round table — ask once, hear five distinct mentor voices in seconds." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- U4.1: warm the upstream LLM origin early. Mentor calls go through
         our own /api proxy (same-origin), but the proxy fans out to
         dashscope.aliyuncs.com — getting DNS + TLS started during shell
         paint shaves 100-300ms off first mentor response on cold loads. -->
    <link rel="preconnect" href="https://dashscope.aliyuncs.com" crossorigin />
    <link rel="dns-prefetch" href="https://dashscope.aliyuncs.com" />

    <title>名人桌 — Mentor Table</title>

    <!-- U7.1 + F150: FOUC kill, served as same-origin /theme-bootstrap.js
         (no inline script). Synchronous (no async/defer) so it runs
         before paint, but external so strict CSP `script-src 'self'`
         allows it without `unsafe-inline`. Source: public/theme-bootstrap.js.
         Coordinates with src/hooks/useTheme.ts (keys: anoncafe_theme,
         anoncafe_theme_mode) and src/i18n.ts (key: language). -->
    <script src="/theme-bootstrap.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
