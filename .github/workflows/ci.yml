name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint • Type-check • Test • Build • E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests (Vitest with coverage)
        # Coverage gate: must stay >=95% (statements/branches/lines/functions).
        # Configured in vite.config.mts coverage.thresholds; do NOT bypass.
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Cypress binary
        run: npx cypress install

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'
