name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# F90: explicit least-privilege token. The verify job only needs to read repo.
permissions:
  contents: read

jobs:
  verify:
    name: Lint • Type-check • Test • Build • E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests (Vitest with coverage)
        # Coverage gate: must stay >=95% (statements/branches/lines/functions).
        # Configured in vite.config.mts coverage.thresholds; do NOT bypass.
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      # E2E uses TWO frameworks (per repo layout):
      #   - Playwright   (e2e/*.spec.ts)            — primary, has webServer wiring
      #   - Cypress      (cypress/e2e/*.cy.js)      — single critical-flow smoke
      # Playwright manages its own webServer via playwright.config.ts.
      # Cypress needs the dev server too, so we let Playwright start them and
      # reuse via reuseExistingServer. We start them once explicitly here so
      # the Cypress step has a known-good baseURL.

      # F89: install ONLY chromium. playwright.config.ts has no `projects:`
      # array so WebKit (if installed) would never run — RUNBOOK-lies pattern.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Cypress binary
        run: npx cypress install

      # F110: server.js is a STATELESS thin OpenAI-compatible proxy
      # (api/mentor-table.js + api/mentor-debug-prompt.js have no in-memory
      # state, no DB, no caches that survive a request). Playwright and
      # Cypress can therefore safely share the same process; no restart
      # between runners is required. If server.js ever grows persistent
      # state (Redis, in-mem cache, mock-mode flags), restart it here.
      - name: Start app servers (vite :3001 + api :8787)
        run: |
          nohup node server.js > /tmp/api.log 2>&1 &
          nohup npx vite --port 3001 --host 127.0.0.1 > /tmp/vite.log 2>&1 &
          npx -y wait-on http://127.0.0.1:8787/api/health http://127.0.0.1:3001 -t 60000

      # F80, F103: Playwright actually runs now (was installed but never invoked).
      - name: Playwright tests
        run: npx playwright test
        env:
          CI: 'true'

      # F92-new: preserve traces/screenshots/videos when Playwright fails.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      # F101: Cypress now has cypress.config.ts at repo root and a running
      # webserver above. `cypress run` will pick up cypress/e2e/**.cy.js.
      - name: Cypress tests
        run: npx cypress run
        env:
          CI: 'true'

      # F92-new: preserve screenshots/videos when Cypress fails.
      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots/
            cypress/videos/
          retention-days: 7
