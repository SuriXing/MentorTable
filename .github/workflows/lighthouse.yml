name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Vercel preview URL to audit'
        required: true
        type: string

# F82, F90: explicit least-privilege token.
#   - contents: read       — checkout
#   - pull-requests: write — post the score-summary comment
permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse audit on Vercel preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Wait for the Vercel preview deployment to finish and capture the URL.
      # F93: only the default GITHUB_TOKEN is needed — no Vercel secret.
      # Skipped on workflow_dispatch (URL provided by input instead).
      - name: Wait for Vercel preview deployment
        if: github.event_name == 'pull_request'
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      # F91: do NOT interpolate ${{ ... }} into bash bodies. Pass via env
      # and read "$VAR" — defends against script-injection.
      - name: Resolve preview URL
        id: url
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_URL: ${{ inputs.preview_url }}
          DETECTED_URL: ${{ steps.vercel-preview.outputs.url }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "preview_url=$INPUT_URL" >> "$GITHUB_OUTPUT"
          else
            echo "preview_url=$DETECTED_URL" >> "$GITHUB_OUTPUT"
          fi

      # F81: score budgets enforced via lighthouserc.json (perf >=0.9,
      # a11y >=0.95, best-practices >=0.95, SEO >=0.9 per OUT-6).
      # F92: temporaryPublicStorage:true publishes the full report (incl.
      # screenshots) to a PUBLIC bucket so the PR comment can deep-link.
      # Intentional — preview URLs are already public — but DO NOT enable
      # this on a workflow that audits an authenticated/internal page.
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        with:
          urls: |
            ${{ steps.url.outputs.preview_url }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      # F91: pass interpolated values via env, read with process.env.X inside
      # the github-script body (not template-string interpolation).
      - name: Comment Lighthouse scores on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LHCI_LINKS: ${{ steps.lhci.outputs.links }}
          PREVIEW_URL: ${{ steps.url.outputs.preview_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const links = process.env.LHCI_LINKS || '';
            const url = process.env.PREVIEW_URL || '';
            const body = [
              '### Lighthouse CI',
              '',
              `**Preview:** ${url}`,
              '',
              '**Reports:**',
              '```',
              links || '(no links produced)',
              '```',
              '',
              '<sub>Generated by `.github/workflows/lighthouse.yml`. Score budgets in `lighthouserc.json`.</sub>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
