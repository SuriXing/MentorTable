name: Lighthouse CI

on:
  pull_request:
    branches: [main, master]
  # Optional: trigger from another workflow once a Vercel preview URL is known.
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Vercel preview URL to audit'
        required: true
        type: string

jobs:
  lighthouse:
    name: Lighthouse audit on Vercel preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Wait for the Vercel preview deployment to finish and capture the URL.
      # Requires GitHub secrets: VERCEL_TOKEN (Vercel personal token).
      # Skipped on workflow_dispatch (URL provided by input instead).
      - name: Wait for Vercel preview deployment
        if: github.event_name == 'pull_request'
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      - name: Resolve preview URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "preview_url=${{ inputs.preview_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "preview_url=${{ steps.vercel-preview.outputs.url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        with:
          urls: |
            ${{ steps.url.outputs.preview_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          # TODO: Add a project-local lighthouserc.json to enforce score budgets
          # (perf >=0.9, a11y >=0.95, best-practices >=0.95, SEO >=0.9).

      - name: Comment Lighthouse scores on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const links = `${{ steps.lhci.outputs.links }}`;
            const manifest = `${{ steps.lhci.outputs.manifest }}`;
            const url = `${{ steps.url.outputs.preview_url }}`;
            const body = [
              '### Lighthouse CI',
              '',
              `**Preview:** ${url}`,
              '',
              '**Reports:**',
              '```',
              links || '(no links produced)',
              '```',
              '',
              '<sub>Generated by `.github/workflows/lighthouse.yml`.</sub>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
